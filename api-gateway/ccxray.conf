# yolo-infra-ccxray observability dashboard reverse-proxy.
#
# yolo-infra-ccxray is single-homed on yolo-internal (no host port of its own). This server
# block — published to the host via -p 127.0.0.1:33390:33390 in the Makefile —
# exposes its dashboard. Served at root path `/` (not a sub-path): the ccxray
# frontend uses root-relative URLs (/_api/*, SSE /_events) and no client-side
# WebSocket, so a root-path proxy is transparent.

map $http_upgrade $connection_upgrade {
	default upgrade;
	''      close;
}

server {
	listen       33390;
	listen  [::]:33390;
	server_name  _;

	client_max_body_size 2G;

	# Defer upstream name resolution to request time via Docker's embedded DNS.
	# A literal `proxy_pass http://yolo-infra-ccxray:5577` resolves once at config
	# load and fails (or caches a stale IP) if yolo-infra-ccxray is down/restarted;
	# the variable form below re-resolves within `valid=`.
	resolver 127.0.0.11 valid=10s ipv6=off;

	location / {
		set $ccxray_upstream http://yolo-infra-ccxray:5577;
		proxy_pass $ccxray_upstream;

		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

		# SSE (EventSource '/_events'): stream, don't buffer, keep open.
		proxy_buffering off;
		proxy_cache off;
		proxy_read_timeout 3600s;
		proxy_send_timeout 3600s;

		# WebSocket Upgrade passthrough (unused by the dashboard today; harmless).
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
	}
}

# vim: ft=nginx
